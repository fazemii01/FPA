name: fingerprint_scanner
description: "10-Finger Fingerprint Scanner Mobile Application"
publish_to: 'none'

version: 1.0.14+15

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.0.0
  
  # HTTP & API
  http: ^1.1.0
  dio: ^5.3.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  hive: ^2.2.0
  hive_flutter: ^1.1.0
  
  # Camera & Image
  camera: ^0.10.5
  image_picker: ^1.0.0
  image: ^4.0.0
  
  # UI
  flutter_svg: ^2.0.0
  google_fonts: ^6.0.0
  
  # Navigation
  go_router: ^12.0.0
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.0.0
  logger: ^2.0.0
  opencv_dart: ^1.4.5
  screen_brightness: ^2.1.9
  url_launcher: ^6.1.11
  package_info_plus: ^8.0.0
  ota_update: ^7.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  hive_generator: ^2.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/jaribakat.jpeg"
